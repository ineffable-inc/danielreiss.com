<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shabbat Shalom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Bungee+Shade&family=Lobster&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }

  .card {
    position: relative;
    width: 420px;
    max-width: 96vw;
    background: linear-gradient(180deg, #000044 0%, #220044 30%, #000066 60%, #110033 100%);
    padding: 16px 12px 12px;
    text-align: center;
    border: 4px solid transparent;
    background-clip: padding-box;
    overflow: hidden;
  }

  /* Animated rainbow border */
  .card::before {
    content: '';
    position: absolute;
    inset: -4px;
    background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088, #ff0000);
    background-size: 400% 100%;
    animation: rainbowSlide 3s linear infinite;
    z-index: -1;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 4px;
    background: linear-gradient(180deg, #000044 0%, #220044 30%, #000066 60%, #110033 100%);
    z-index: -1;
  }
  @keyframes rainbowSlide {
    0% { background-position: 0% 50%; }
    100% { background-position: 400% 50%; }
  }

  .content { position: relative; z-index: 1; }

  /* Tiled star background */
  .bg-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    z-index: 0;
    animation: twinkleField 4s ease-in-out infinite alternate;
  }
  @keyframes twinkleField {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Lens flare */
  .lens-flare {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(255,255,200,0.15) 0%, rgba(255,200,100,0.05) 30%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Dove GIF energy - bouncing row */
  .dove-banner {
    font-size: 30px;
    letter-spacing: 2px;
    margin: 4px 0 8px;
    line-height: 1;
  }
  .dove-banner span {
    display: inline-block;
    animation: doveFloat 2s ease-in-out infinite;
  }
  .dove-banner span:nth-child(2) { animation-delay: 0.15s; }
  .dove-banner span:nth-child(3) { animation-delay: 0.3s; }
  .dove-banner span:nth-child(4) { animation-delay: 0.45s; }
  .dove-banner span:nth-child(5) { animation-delay: 0.6s; }
  .dove-banner span:nth-child(6) { animation-delay: 0.75s; }
  .dove-banner span:nth-child(7) { animation-delay: 0.9s; }
  @keyframes doveFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Rainbow divider bar - the classic */
  .rainbow-bar {
    height: 6px;
    background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff);
    margin: 10px 0;
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(255,255,255,0.15);
  }
  .rainbow-bar.thin {
    height: 3px;
    margin: 8px 20px;
  }

  /* WordArt Hebrew - beveled, shadowed, extruded */
  .hebrew {
    font-family: 'Bungee Shade', sans-serif;
    font-size: 42px;
    color: #ffd700;
    text-shadow:
      0 0 10px rgba(255,215,0,0.8),
      0 0 20px rgba(255,215,0,0.4),
      0 0 40px rgba(255,150,0,0.3),
      2px 2px 0 #cc8800,
      4px 4px 0 #995500,
      6px 6px 0 #663300;
    line-height: 1.3;
    margin: 8px 0 4px;
    animation: wordArtPulse 3s ease-in-out infinite;
  }
  @keyframes wordArtPulse {
    0%, 100% { text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,150,0,0.3), 2px 2px 0 #cc8800, 4px 4px 0 #995500, 6px 6px 0 #663300; }
    50% { text-shadow: 0 0 15px rgba(255,215,0,1), 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,150,0,0.4), 2px 2px 0 #cc8800, 4px 4px 0 #995500, 6px 6px 0 #663300; }
  }

  /* English in Lobster - over-italicized energy */
  .english {
    font-family: 'Lobster', cursive;
    font-size: 32px;
    color: #fff;
    text-shadow: 0 0 12px rgba(135,206,235,0.6), 0 0 25px rgba(135,206,235,0.3), 3px 3px 6px rgba(0,0,0,0.8);
    margin-bottom: 8px;
  }

  /* Emoji grid - just too many */
  .emoji-feast {
    font-size: 26px;
    letter-spacing: 4px;
    line-height: 1.6;
    margin: 6px 0;
  }

  /* Rotating star of david */
  .rotating-star {
    display: inline-block;
    font-size: 36px;
    animation: spinStar 8s linear infinite;
    margin: 8px 0;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  }
  @keyframes spinStar {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Candle row */
  .candle-emoji-row {
    font-size: 34px;
    letter-spacing: 8px;
    margin: 4px 0;
    filter: drop-shadow(0 0 10px rgba(255,150,50,0.5));
  }

  /* "Shabbat Shalom" again but different font because why not */
  .repeat-blessing {
    font-family: 'Comic Neue', cursive;
    font-weight: 700;
    font-size: 18px;
    color: #ff88cc;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.6), 0 0 10px rgba(255,136,204,0.3);
    margin: 6px 0;
    letter-spacing: 2px;
  }

  /* Visitor counter */
  .visitor-counter {
    display: inline-block;
    margin: 10px auto 4px;
    background: #111;
    border: 2px inset #666;
    padding: 3px 10px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #00ff00;
    letter-spacing: 1px;
  }

  /* Under construction / made with love */
  .made-with {
    font-family: 'Comic Neue', cursive;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Sparkle cursor followers */
  .sparkle-field {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .float-sparkle {
    position: absolute;
    font-size: 14px;
    animation: floatUp 6s linear infinite;
    opacity: 0;
  }
  .float-sparkle:nth-child(1) { left: 10%; animation-delay: 0s; }
  .float-sparkle:nth-child(2) { left: 25%; animation-delay: 1.2s; font-size: 10px; }
  .float-sparkle:nth-child(3) { left: 50%; animation-delay: 2.5s; }
  .float-sparkle:nth-child(4) { left: 70%; animation-delay: 0.8s; font-size: 11px; }
  .float-sparkle:nth-child(5) { left: 85%; animation-delay: 3.5s; font-size: 16px; }
  .float-sparkle:nth-child(6) { left: 38%; animation-delay: 4.2s; font-size: 12px; }
  .float-sparkle:nth-child(7) { left: 62%; animation-delay: 1.8s; }
  .float-sparkle:nth-child(8) { left: 5%; animation-delay: 5s; font-size: 10px; }
  @keyframes floatUp {
    0% { bottom: -20px; opacity: 0; }
    10% { opacity: 0.9; }
    90% { opacity: 0.9; }
    100% { bottom: 110%; opacity: 0; transform: translateX(20px); }
  }

  /* Blinking text because of course */
  .blink {
    animation: blinker 1.2s step-start infinite;
  }
  @keyframes blinker {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* Marquee substitute */
  .scroll-wrap {
    overflow: hidden;
    white-space: nowrap;
    margin: 6px 0;
  }
  .scroll-text {
    display: inline-block;
    animation: marqueeScroll 12s linear infinite;
    font-size: 16px;
    letter-spacing: 3px;
  }
  @keyframes marqueeScroll {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  .wine-glass { 
    display: inline-block; 
    font-size: 40px; 
    animation: wineWobble 2s ease-in-out infinite; 
    filter: drop-shadow(0 0 6px rgba(128,0,32,0.4));
  }
  .wine-glass:nth-child(2) { animation-delay: 1s; }
  @keyframes wineWobble {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="bg-stars"></div>
  <div class="lens-flare"></div>

  <div class="sparkle-field">
    <div class="float-sparkle">✨</div>
    <div class="float-sparkle">⭐</div>
    <div class="float-sparkle">✨</div>
    <div class="float-sparkle">💫</div>
    <div class="float-sparkle">✨</div>
    <div class="float-sparkle">⭐</div>
    <div class="float-sparkle">✨</div>
    <div class="float-sparkle">💫</div>
  </div>

  <div class="content">

    <div class="dove-banner">
      <span>🕊️</span><span>🕊️</span><span>🕊️</span><span>🕊️</span><span>🕊️</span><span>🕊️</span><span>🕊️</span>
    </div>

    <div class="rainbow-bar"></div>

    <div class="candle-emoji-row">🕯️🕯️🕯️🕯️🕯️</div>

    <div class="hebrew">שבת שלום</div>
    <div class="english">Shabbat Shalom</div>

    <div class="rotating-star">✡️</div>

    <div class="rainbow-bar thin"></div>

    <div class="emoji-feast">
      🍞🍷🌹✨🍞🍷🌹✨
    </div>

    <div style="margin: 6px 0;">
      <span class="wine-glass">🍷</span>
      <span class="wine-glass">🍷</span>
    </div>

    <div class="scroll-wrap">
      <div class="scroll-text">
        ✡️ 🕊️ SHABBAT SHALOM 🕊️ ✡️ 🕊️ SHABBAT SHALOM 🕊️ ✡️ 🕊️ SHABBAT SHALOM 🕊️ ✡️
      </div>
    </div>

    <div class="rainbow-bar"></div>

    <div class="repeat-blessing">
      <span class="blink">★</span> Shabbat Shalom <span class="blink">★</span>
    </div>

    <div class="emoji-feast">🕊️🕯️✡️🌸🕊️🕯️✡️🌸</div>

    <div class="rainbow-bar thin"></div>

    <div class="visitor-counter">
      You are visitor #000,613
    </div>

    <div class="made-with">
      ✡️ best viewed in Internet Explorer 6.0 ✡️
    </div>

  </div>
</div>

</body>
</html>
